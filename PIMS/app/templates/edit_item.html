<!DOCTYPE html>
<html>
<head>
    <title>Edit Item</title>
</head>
<body>

<h2>Edit Item</h2>

<form method="POST">
    {% csrf_token %}

    <input name="name" value="{{ item.name }}"><br><br>

    <input name="category" value="{{ item.category }}"><br><br>

    <input type="number" name="quantity" value="{{ item.quantity }}"><br><br>

    <input type="number" name="min_quantity" value="{{ item.min_quantity }}"><br><br>

    <input type="date" name="expiry_date" value="{{ item.expiry_date|date:'Y-m-d' }}"><br><br>

    <textarea name="description">{{ item.description }}</textarea><br><br>

    <input type="number" step="0.01" name="price" value="{{ item.price }}"><br><br>

    <button>Update Item</button>
</form>

<hr>
<a href="/">🏠 Dashboard</a>

</body>
</html>
